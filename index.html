<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Shivuuu ❤️</title>
    <style>
        :root {
            --primary: #ff1f6d;
            --secondary: #ff8fab;
            --bg: #fff0f3;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg);
            font-family: 'Arial Rounded MT Bold', sans-serif;
            overflow: hidden;
            text-align: center;
            transition: background 1.5s ease;
        }

        .stage {
            display: none;
            width: 85%;
            z-index: 10;
            animation: fadeIn 1s ease-in;
        }

        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .heart-main { font-size: 70px; animation: heartbeat 1.2s infinite; }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        #text-container {
            font-size: 1.4rem;
            color: var(--primary);
            line-height: 1.8;
            font-weight: bold;
            margin: 20px 0;
        }

        .highlight {
            font-size: 1.8rem;
            display: block;
            margin-top: 15px;
            color: #ff0040;
            text-shadow: 0 0 10px rgba(255, 0, 64, 0.3);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(255, 31, 109, 0.4);
            margin-top: 20px;
            font-weight: bold;
        }

        .floating {
            position: absolute;
            pointer-events: none;
            animation: rise linear forwards;
        }

        @keyframes rise {
            to { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="stg1" class="stage active" onclick="startStory()">
        <div class="heart-main">🎁</div>
        <h2 style="color: var(--primary);">Shivuuu, I have a secret...</h2>
        <p style="color: #888;">(Tap to open)</p>
    </div>

    <div id="stg2" class="stage">
        <div id="text-container"></div>
        <div id="action-btn" style="display:none;">
            <button onclick="celebrate()">Will you be mine? 💍</button>
        </div>
    </div>

    <div id="stg3" class="stage">
        <div class="heart-main">💖</div>
        <h1 style="color: var(--primary);">I Love You So So Much!</h1>
        <p style="color: var(--secondary); font-size: 1.2rem;">You made me the happiest person today, Shivuuu! ✨</p>
    </div>

    <script>
        const story = "Tujhe rusna, Tujhe hasna,\r\nMajhya sathi sagla aahe...\r\nTu sobat aslis ki,\r\nHe jag khup vegla aahe.\r\n\r\nMajhya ayushyat kaayamswaruphi,\r\nRahshil ka?\r\n";

        function startStory() {
            document.getElementById('stg1').classList.remove('active');
            document.getElementById('stg2').classList.add('active');
            typeWriter(story, 'text-container', 60);
        }

        function typeWriter(text, elementId, speed) {
            let i = 0;
            const elem = document.getElementById(elementId);
            function type() {
                if (i < text.length) {
                    if (text.substr(i, 1) === "\r") { elem.innerHTML += "<br>"; i += 2; }
                    else { elem.innerHTML += text.charAt(i); i++; }
                    setTimeout(type, speed);
                } else {
                    document.getElementById('action-btn').style.display = 'block';
                }
            }
            type();
        }

        function celebrate() {
            document.getElementById('stg2').classList.remove('active');
            document.getElementById('stg3').classList.add('active');
            document.body.style.background = "#ffccd5";
            
            // Colorful Heart Rain
            const symbols = ['❤️', '💖', '✨', '🌸', '💘'];
            for(let i=0; i<100; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.classList.add('floating');
                    el.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.top = '100vh';
                    el.style.fontSize = (Math.random() * 20 + 20) + 'px';
                    el.style.animationDuration = (Math.random() * 2 + 3) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 5000);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
