<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Shivuuu ❤️</title>
    <style>
        :root {
            --bg-color: #fff0f3;
            --main-pink: #ff4d6d;
            --soft-pink: #ffb3c1;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            overflow: hidden;
            text-align: center;
            transition: background-color 2s ease;
        }

        /* Stages */
        .stage {
            display: none;
            width: 90%;
            z-index: 10;
            animation: bounceIn 0.8s ease forwards;
        }

        .active { display: block; }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); }
        }

        /* Decorations */
        .heart-icon { font-size: 80px; filter: drop-shadow(0 0 10px rgba(255,77,109,0.5)); }
        
        #shayari-text {
            font-size: 1.4rem;
            color: #ff4d6d;
            line-height: 1.8;
            font-weight: bold;
            text-shadow: 1px 1px 0px white;
        }

        .iloveyou {
            font-size: 2rem;
            color: #ff0040;
            margin-top: 20px;
            display: block;
            animation: glow 1s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #ffb3c1; }
            to { text-shadow: 0 0 20px #ff4d6d, 0 0 30px #ff4d6d; }
        }

        /* Colorful Floating Elements */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0.8;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }

    </style>
</head>
<body onclick="nextStage()">

    <div id="bg-elements"></div>

    <div id="scene1" class="stage active">
        <div class="heart-icon">💖</div>
        <h2 style="color: #ff4d6d;">Hey Shivuuu...</h2>
        <p style="color: #888;">(Tap to open my heart)</p>
    </div>

    <div id="scene2" class="stage">
        <div id="shayari-text"></div>
    </div>

    <div id="scene3" class="stage">
        <h1 style="color: #ff4d6d; margin:0;">I'm Sorry...</h1>
        <p style="color: #555; font-size: 1.1rem; padding: 20px;">
            I know I made a mistake, but my world is boring without you. 
            Can we please start over?
        </p>
        <div class="heart-icon" style="font-size: 50px;">🥺🌹</div>
    </div>

    <script>
        let currentStage = 0;
        const stages = ['scene1', 'scene2', 'scene3'];
        const colors = ['#fff0f3', '#f0f4ff', '#fff9e6', '#f2fff0'];

        const shayari = "Tujhe rusna, Tujhe hasna,\r\nMajhya sathi sagla aahe...\r\nTu sobat aslis ki,\r\nHe jag khup vegla aahe.\r\n\r\n<span class='iloveyou'>I Love You So Much! ❤️</span>";

        function createConfetti() {
            const colors = ['#ff4d6d', '#ffb3c1', '#ffd700', '#4cc9f0', '#72efdd'];
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.classList.add('confetti');
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.top = '-10px';
                    c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    c.style.width = Math.random() * 12 + 5 + 'px';
                    c.style.height = c.style.width;
                    c.style.animationDuration = Math.random() * 3 + 2 + 's';
                    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 5000);
                }, i * 100);
            }
        }

        function typeWriter(text, elementId, speed) {
            let i = 0;
            const elem = document.getElementById(elementId);
            function type() {
                if (i < text.length) {
                    if (text.substr(i, 4) === "<br>") { elem.innerHTML += "<br>"; i += 4; }
                    else if (text.substr(i, 1) === "\r") { elem.innerHTML += "<br>"; i += 2; }
                    else if (text.substr(i, 1) === "<") { 
                        let end = text.indexOf(">", i);
                        elem.innerHTML += text.substring(i, end + 1);
                        i = end + 1;
                    }
                    else {
                        elem.innerHTML += text.charAt(i);
                        i++;
                    }
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function nextStage() {
            if (currentStage >= stages.length - 1) return;

            document.getElementById(stages[currentStage]).classList.remove('active');
            currentStage++;
            const next = document.getElementById(stages[currentStage]);
            next.classList.add('active');

            // Change background color randomly
            document.body.style.backgroundColor = colors[currentStage % colors.length];

            if (stages[currentStage] === 'scene2') {
                typeWriter(shayari, 'shayari-text', 60);
            }

            if (stages[currentStage] === 'scene3') {
                createConfetti();
            }
        }
    </script>
</body>
</html>
